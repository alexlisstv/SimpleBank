services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simplebank
      POSTGRES_PASSWORD: simplebank
      POSTGRES_DB: simplebank
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplebank -d simplebank"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://simplebank:simplebank@db:5432/simplebank
      SECRET_KEY: ${SECRET_KEY:-django-docker-dev-change-me}
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: simplebank
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
